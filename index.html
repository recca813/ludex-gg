<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUDEX — Deals. News. Level up.</title>
<meta name="description" content="The latest PC game deals and gaming news, auto-updated.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#12101f; --bg2:#181530; --card:#201c38; --card2:#292350;
  --ink:#f2eefc; --muted:#9a92b8; --line:rgba(255,255,255,.09);
  --coral:#ff5470; --coral2:#ff7a5c; --gold:#ffc24b; --mint:#3ddc97; --cyan:#4cc9f0; --viol:#a78bfa;
  --r:14px; --disp:'Bungee',system-ui,sans-serif; --body:'Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-color:#3a3360 var(--bg)}
body{background:var(--bg);color:var(--ink);font-family:var(--body);min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(167,139,250,.14),transparent),
  radial-gradient(ellipse 60% 40% at 90% 110%,rgba(255,84,112,.08),transparent);}
a{color:inherit;text-decoration:none}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:var(--body);background:var(--bg2);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;padding:11px 14px;font-size:15px;width:100%;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--viol)}
::placeholder{color:#6e6690}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:50;background:rgba(18,16,31,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line)}
.hwrap{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:16px;padding:12px 20px}
.logo{font-family:var(--disp);font-size:22px;letter-spacing:1px;display:flex;align-items:center;gap:9px;flex:none}
.logo .cart{width:26px;height:22px;border-radius:4px 4px 7px 7px;background:linear-gradient(135deg,var(--coral),var(--gold));
  position:relative;box-shadow:0 0 14px rgba(255,84,112,.5)}
.logo .cart::after{content:"";position:absolute;inset:5px 6px auto 6px;height:5px;background:var(--bg);border-radius:2px}
.logo span b{color:var(--gold)}
.search{flex:1;max-width:460px;position:relative}
.search input{padding-left:38px;border-radius:99px}
.search::before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-54%);font-size:18px;color:var(--muted)}
.hbtns{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:99px;font-weight:600;font-size:14px;
  border:1px solid var(--line);background:var(--card);transition:transform .12s,background .15s;white-space:nowrap}
.btn:hover{background:var(--card2);transform:translateY(-1px)}
.btn.pri{background:var(--coral);border-color:transparent;color:#fff;box-shadow:0 4px 18px rgba(255,84,112,.35)}
.btn.pri:hover{background:var(--coral2)}
.btn.gold{background:var(--gold);border-color:transparent;color:#221a00}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 12px;font-size:13px}

/* ---------- marquee ---------- */
.ticker{border-bottom:1px solid var(--line);background:linear-gradient(90deg,rgba(255,84,112,.10),rgba(255,194,75,.10),rgba(76,201,240,.10));
  overflow:hidden;font-size:12.5px;color:var(--muted)}
.ticker .track{display:flex;gap:44px;white-space:nowrap;padding:7px 0;width:max-content;animation:tick linear infinite;animation-duration:40s}
.ticker b{color:var(--gold);font-weight:600}
@keyframes tick{to{transform:translateX(-50%)}}

/* ---------- layout ---------- */
main{max-width:1200px;margin:0 auto;padding:26px 20px 90px}
.eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:8px}
h1.disp{font-family:var(--disp);font-size:clamp(26px,4.5vw,44px);line-height:1.12;font-weight:400}
h2.sec{font-family:var(--disp);font-size:19px;font-weight:400;margin:34px 0 16px;display:flex;align-items:center;gap:10px}
h2.sec::after{content:"";flex:1;height:1px;background:var(--line)}
.hero{padding:34px 0 8px}
.hero p{color:var(--muted);margin:14px 0 22px;font-size:16.5px;line-height:1.6;max-width:60ch}
.hero .accent{background:linear-gradient(90deg,var(--coral),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
@media(max-width:860px){.hwrap{flex-wrap:wrap}.search{order:3;max-width:none;flex-basis:100%}}

/* ---------- post cards (cartridge signature) ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.cart-card{background:var(--card);border:1px solid var(--line);border-radius:12px 12px 16px 16px;overflow:hidden;
  transition:transform .16s,box-shadow .16s,border-color .16s;position:relative;display:flex;flex-direction:column}
.cart-card:hover{transform:translateY(-4px) rotate(-.4deg);box-shadow:0 18px 36px rgba(0,0,0,.5);border-color:rgba(255,255,255,.18)}
.cart-card .notch{height:10px;display:flex;gap:4px;padding:0 12px;align-items:center}
.cart-card .notch i{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.12)}
.thumb{aspect-ratio:16/9;display:grid;place-items:center;font-size:52px;position:relative;overflow:hidden;background-size:cover;background-position:center}
.thumb::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.14) 0 1px,transparent 1px 3px);pointer-events:none}
.thumb .badge{position:absolute;top:9px;left:9px;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 9px;border-radius:6px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
.thumb .disc{position:absolute;top:9px;right:9px;font-size:12px;font-weight:700;padding:4px 9px;border-radius:6px;background:var(--mint);color:#04241a}
.cmeta{padding:13px 14px 15px;display:flex;flex-direction:column;gap:4px;flex:1}
.cmeta .t{font-weight:700;font-size:15.5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cmeta .by{font-size:13px;color:var(--muted)}
.cmeta .sum{font-size:13px;color:var(--muted);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cmeta .stats{margin-top:auto;padding-top:9px;display:flex;gap:13px;align-items:center;font-size:12.5px;color:var(--muted)}
.cmeta .price{font-weight:700;color:var(--ink)}
.cmeta .was{text-decoration:line-through;color:var(--muted);font-weight:400}

.empty{padding:50px 20px;text-align:center;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:10px}
footer{border-top:1px solid var(--line);padding:26px 20px;text-align:center;color:var(--muted);font-size:13px}
footer b{font-family:var(--disp);color:var(--ink);font-weight:400}
.toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%,80px);background:var(--card2);border:1px solid var(--viol);
  padding:11px 20px;border-radius:99px;font-size:14px;font-weight:600;z-index:200;transition:transform .25s;box-shadow:0 12px 30px rgba(0,0,0,.5)}
.toast.show{transform:translate(-50%,0)}

/* ---------- light theme ---------- */
body.light{--bg:#f3f0fa;--bg2:#ffffff;--card:#ffffff;--card2:#ece6f8;--ink:#241d44;--muted:#6a628c;--line:rgba(35,22,80,.13);
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(167,139,250,.16),transparent),
  radial-gradient(ellipse 60% 40% at 90% 110%,rgba(255,84,112,.07),transparent)}
body.light header{background:rgba(243,240,250,.85)}
body.light .cart-card:hover{box-shadow:0 18px 36px rgba(50,30,110,.16);border-color:rgba(35,22,80,.22)}
body.light .btn{background:#fff}
body.light .btn:hover{background:var(--card2)}
body.light .btn.pri{background:var(--coral);color:#fff}
body.light .btn.gold{background:var(--gold);color:#221a00}
body.light .thumb .badge{background:rgba(0,0,0,.55);color:#fff}
body.light .toast{background:#fff;box-shadow:0 12px 30px rgba(50,30,110,.22);color:var(--ink)}
body.light html{scrollbar-color:#c9bfe8 var(--bg)}
</style>
</head>
<body>
<header>
  <div class="hwrap">
    <a class="logo" href="#/" ><span class="cart"></span><span>LU<b>DEX</b></span></a>
    <div class="search"><input id="searchIn" placeholder="Search deals, news…" aria-label="Search"></div>
    <div class="hbtns" id="hbtns"></div>
  </div>
  <div class="ticker" aria-hidden="true"><div class="track" id="tickTrack"></div></div>
</header>

<main id="view" aria-live="polite"></main>

<footer><b>LUDEX</b> · from the Latin <i>ludus</i> — “game, play.” The latest PC game deals and news, auto-updated.</footer>

<div class="toast" id="toast"></div>
<script>
/* ============================================================
   LUDEX · Deals & News edition (Supabase-backed, read-only content site)
============================================================ */
const SUPABASE_URL      = "https://jdtlncuaoazzmlbgwgaq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkdGxuY3Vhb2F6em1sYmd3Z2FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NDY0MTYsImV4cCI6MjA5OTIyMjQxNn0.u6b6dGM4pIN6dOYJqav5IWIfH2P_n6XjrzL-ZpBLjHY";

"use strict";
const $=s=>document.querySelector(s), esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const ago=t=>{const s=(Date.now()-new Date(t).getTime())/1e3;if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";if(s<2592e3)return Math.floor(s/86400)+"d ago";return Math.floor(s/2592e3)+"mo ago"};
const money=n=>n==null?"":"$"+Number(n).toFixed(2);

const configured=()=>SUPABASE_URL.startsWith("https://")&&SUPABASE_ANON_KEY.length>40;
let sb=null;

/* ---------- theme (per-device) ---------- */
let THEME="dark";
function loadTheme(){try{THEME=localStorage.getItem("ludex:theme")||"dark"}catch(e){}applyTheme()}
function applyTheme(){document.body.classList.toggle("light",THEME==="light")}
function toggleTheme(){THEME=THEME==="light"?"dark":"light";applyTheme();try{localStorage.setItem("ludex:theme",THEME)}catch(e){}renderHeader();}

/* ---------- toast ---------- */
let toastT;function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2600)}

/* ---------- router ---------- */
const routes={};
function go(h){location.hash=h}
let renderSeq=0;
async function render(){
  const seq=++renderSeq;
  const [_,path,arg]=(location.hash||"#/").split("/");
  window.scrollTo(0,0);
  $("#view").innerHTML=`<div class="empty"><div class="big">🕹️</div>Loading…</div>`;
  renderHeader();
  try{
    const fn=routes[path||""]||routes[""];
    const html=await fn(decodeURIComponent(arg||""));
    if(seq!==renderSeq)return;
    $("#view").innerHTML=html;
  }catch(e){
    console.error(e);
    if(seq===renderSeq)$("#view").innerHTML=`<div class="empty"><div class="big">📡</div>Couldn't reach the database.<br><span style="font-size:13px">${esc(e.message||e)}</span><br><br><button class="btn pri" onclick="render()">Try again</button></div>`;
  }
}
window.addEventListener("hashchange",render);
window.render=render;

/* ---------- header ---------- */
function renderHeader(){
  $("#hbtns").innerHTML=`<button class="btn sm ghost" id="themeBtn" title="Toggle theme" aria-label="Toggle light or dark theme">${THEME==="light"?"🌙":"☀️"}</button>`;
  const tb=$("#themeBtn");if(tb)tb.onclick=toggleTheme;
}
$("#searchIn").addEventListener("keydown",e=>{if(e.key==="Enter"&&e.target.value.trim())go("/search/"+encodeURIComponent(e.target.value.trim()))});

/* ---------- shared UI ---------- */
function dealCard(p){
  return`<a class="cart-card" href="${esc(p.url)}" target="_blank" rel="noopener">
    <div class="thumb" style="${p.image_url?`background-image:url('${esc(p.image_url)}')`:"background:linear-gradient(135deg,#ff5470,#8a2be2)"}">
      <span class="badge">${esc(p.store_or_source||"Deal")}</span>${p.discount_pct?`<span class="disc">-${Math.round(p.discount_pct)}%</span>`:""}
    </div>
    <div class="notch"><i></i><i></i><i></i></div>
    <div class="cmeta">
      <span class="t">${esc(p.title)}</span>
      <span class="stats">
        ${p.price_current!=null?`<span class="price">${money(p.price_current)}</span>`:""}
        ${p.price_original!=null&&p.price_original>p.price_current?`<span class="was">${money(p.price_original)}</span>`:""}
      </span>
      <span class="by">${ago(p.published_at)}</span>
    </div></a>`;
}
function newsCard(p){
  return`<a class="cart-card" href="${esc(p.url)}" target="_blank" rel="noopener">
    <div class="thumb" style="${p.image_url?`background-image:url('${esc(p.image_url)}')`:"background:linear-gradient(135deg,#4cc9f0,#a78bfa)"}">
      <span class="badge">${esc(p.store_or_source||"News")}</span>
    </div>
    <div class="notch"><i></i><i></i><i></i></div>
    <div class="cmeta">
      <span class="t">${esc(p.title)}</span>
      <span class="sum">${esc(p.summary||"")}</span>
      <span class="by">${ago(p.published_at)}</span>
    </div></a>`;
}
const grid=(list,card)=>list&&list.length?`<div class="grid">${list.map(card).join("")}</div>`:`<div class="empty"><div class="big">🕳️</div>Nothing here yet.</div>`;
const q=async p=>{const {data,error}=await p;if(error)throw error;return data||[]};

/* ============================================================ VIEWS */
routes[""]=async()=>{
  if(!configured())return setupScreen();
  const [deals,news]=await Promise.all([
    q(sb.from("posts").select("*").eq("kind","deal").order("published_at",{ascending:false}).limit(24)),
    q(sb.from("posts").select("*").eq("kind","news").order("published_at",{ascending:false}).limit(24))
  ]);
  if(deals.length){
    const one=deals.slice(0,10).map(d=>`<span>▸ <b>${esc(d.title)}</b>${d.discount_pct?` — -${Math.round(d.discount_pct)}%`:""}</span>`).join("");
    const track=$("#tickTrack");
    // repeat the set until it's at least 2 screens wide, so the -50% loop never shows a gap
    let items=one,reps=1;
    while(items.length<one.length*4&&reps<12){items+=one;reps++}
    track.innerHTML=items+items;
    requestAnimationFrame(()=>{
      const half=track.scrollWidth/2;
      track.style.animationDuration=`${Math.max(20,half/60)}s`; // constant ~60px/s regardless of content length
    });
  }
  const hero=`<section class="hero">
    <div class="eyebrow">Deals &amp; news, auto-updated</div>
    <h1 class="disp">Never miss a <span class="accent">sale</span>.<br>Never miss the <span class="accent">news</span>.</h1>
    <p>LUDEX tracks PC game price drops and gaming news automatically, so you don't have to check ten sites a day.</p>
  </section>`;
  return`${hero}
    <h2 class="sec">🔥 Latest Deals</h2>${grid(deals,dealCard)}
    <h2 class="sec">📰 Gaming News</h2>${grid(news,newsCard)}`;
};

routes["search"]=async term=>{
  const safe=term.replace(/[,()%]/g," ").trim();
  const posts=safe?await q(sb.from("posts").select("*")
    .or(`title.ilike.%${safe}%,summary.ilike.%${safe}%`).order("published_at",{ascending:false}).limit(60)):[];
  return`<h2 class="sec">Results for "${esc(term)}" (${posts.length})</h2>${grid(posts,p=>p.kind==="deal"?dealCard(p):newsCard(p))}`;
};

function setupScreen(){
  return`<div class="empty"><div class="big">⚙️</div>This build needs its Supabase keys before it can show deals/news.<br><span style="font-size:13px">Paste the URL + anon key at the top of this file's &lt;script&gt; section.</span></div>`;
}

/* ---------- boot ---------- */
(async()=>{
  loadTheme();
  if(!configured()){renderHeader();$("#view").innerHTML=setupScreen();return}
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  render();
})();
</script>
</body>
</html>
